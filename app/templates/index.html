<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker To-Do | Cristian Llorente</title>
    <style>
        /* Fondo animado y moderno */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Tarjeta estilo Glassmorphism */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 20px; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #23a6d5; }

        button {
            padding: 10px 20px;
            background: #23a6d5;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #e73c7e; transform: scale(1.05); }

        /* Lista de tareas */
        ul { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; }

        li {
            background: #f8f9fa;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #23a6d5;
            animation: fadeIn 0.5s ease;
        }

        /* Estilo para tareas completadas */
        .task-text {
            flex: 1;
            text-align: left;
            transition: 0.3s;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #aaa;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-check {
            background: #28a745;
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .btn-check.undo {
            background: #ffc107;
            color: #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: 20px;
            font-size: 0.9em;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 Mi Lista para CI/CD Prueba Video</h2>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="¿Qué hay que hacer hoy?">
            <button onclick="addTask()">Añadir</button>
        </div>

        <ul id="taskList"></ul>

        <div class="footer">
            Creado con 💪 por Cristian Llorente
        </div>
    </div>

    <script>
        async function loadTasks() {
            const res = await fetch('/tasks');
            const tasks = await res.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(t => {
                const isCompleted = t.completed;
                list.innerHTML += `
                    <li>
                        <span class="task-text ${isCompleted ? 'completed' : ''}">${t.content}</span>
                        <div class="actions">
                            <button class="btn-check ${isCompleted ? 'undo' : ''}" onclick="toggleTask(${t.id}, ${isCompleted})">
                                ${isCompleted ? '↩️' : '✅'}
                            </button>
                            <small style="color:#999">#${t.id}</small>
                        </div>
                    </li>`;
            });
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;

            await fetch('/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: input.value})
            });
            input.value = '';
            loadTasks();
        }

        async function toggleTask(id, currentStatus) {
            await fetch(`/tasks/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({completed: !currentStatus})
            });
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
