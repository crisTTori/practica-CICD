version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  test-and-quality:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-python-deps-{{ checksum "app/requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
            - v1-python-deps-

      - run:
          name: Crear entorno virtual e instalar dependencias
          command: |
            python -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r app/requirements.txt
            pip install -r requirements-dev.txt

      - save_cache:
          key: v1-python-deps-{{ checksum "app/requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
          paths:
            - venv

      - run:
          name: Ejecutar tests con cobertura
          command: |
            . venv/bin/activate
            pytest --cov=app --cov-report=xml --cov-report=term-missing

      - run:
          name: Ejecutar flake8
          command: |
            . venv/bin/activate
            flake8 app tests

      - run:
          name: Ejecutar pylint
          command: |
            . venv/bin/activate
            pylint app/main.py

      - persist_to_workspace:
          root: ~/project
          paths:
            - coverage.xml
            - .

      - store_artifacts:
          path: coverage.xml
          destination: coverage-report

  sonar-analysis:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

    steps:
      - attach_workspace:
          at: ~/project
      - sonarcloud/scan

  snyk-analysis:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-python-app-deps-{{ checksum "app/requirements.txt" }}
            - v1-python-app-deps-

      - run:
          name: Crear entorno virtual e instalar dependencias de la app
          command: |
            python -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r app/requirements.txt

      - save_cache:
          key: v1-python-app-deps-{{ checksum "app/requirements.txt" }}
          paths:
            - venv

      - run:
          name: Instalar Snyk CLI
          command: |
            curl -Lo snyk https://static.snyk.io/cli/latest/snyk-linux
            chmod +x ./snyk
            sudo mv ./snyk /usr/local/bin/snyk

      - run:
          name: Autenticar Snyk
          command: snyk auth $SNYK_TOKEN

      - run:
          name: Analizar vulnerabilidades
          command: |
            . venv/bin/activate
            snyk test --file=app/requirements.txt --severity-threshold=high || echo "Vulnerabilidades encontradas"

      - run:
          name: Generar reporte
          command: |
            . venv/bin/activate
            snyk test --file=app/requirements.txt --json > snyk-report.json || true

      - store_artifacts:
          path: snyk-report.json
          destination: snyk-report
          
  publish-docker-image:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project

    steps:
      - checkout

      - setup_remote_docker:
          version: 20.10.24

      - run:
          name: Login Docker Hub
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - run:
          name: Build Docker image
          command: |
            docker build -t $DOCKERHUB_USERNAME/apitodo:latest ./app
            docker build -t $DOCKERHUB_USERNAME/apitodo:${CIRCLE_SHA1} ./app

      - run:
          name: Push Docker image
          command: |
            docker push $DOCKERHUB_USERNAME/apitodo:latest
            docker push $DOCKERHUB_USERNAME/apitodo:${CIRCLE_SHA1}

      - run:
          name: Actualizar manifiesto Kubernetes con la nueva imagen
          command: |
            sed -i "s|image: .*|image: ${DOCKERHUB_USERNAME}/apitodo:${CIRCLE_SHA1}|" k8s/api-deployment.yaml
            echo "Imagen actualizada en k8s/api-deployment.yaml"
            grep "image:" k8s/api-deployment.yaml

      - run:
          name: Commit y push del nuevo tag al repositorio
          command: |
            git config --global user.email "$GIT_EMAIL"
            git config --global user.name "$GIT_USERNAME"

            git add k8s/api-deployment.yaml

            git diff --cached --quiet && echo "Sin cambios para commitear" && exit 0

            git commit -m "Actualizar imagen desplegada a ${CIRCLE_SHA1} [skip ci]"

            git remote set-url origin https://${GITHUB_TOKEN}@github.com/crisTTori/practica-CICD.git
            git push origin main

workflows:
  ci_pipeline:
    jobs:
      - test-and-quality
      - sonar-analysis:
          requires:
            - test-and-quality
      - snyk-analysis:
          requires:
            - test-and-quality
      - publish-docker-image:
          requires:
            - test-and-quality
            - sonar-analysis
            - snyk-analysis
          filters:
            branches:
              only: main