version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  test-and-quality:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-python-deps-{{ checksum "app/requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
            - v1-python-deps-

      - run:
          name: Crear entorno virtual e instalar dependencias
          command: |
            python -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r app/requirements.txt
            pip install -r requirements-dev.txt

      - save_cache:
          key: v1-python-deps-{{ checksum "app/requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
          paths:
            - venv

      - run:
          name: Ejecutar tests
          command: |
            . venv/bin/activate
            pytest

      - run:
          name: Generar cobertura
          command: |
            . venv/bin/activate
            pytest --cov=app --cov-report=xml --cov-report=term-missing

      - run:
          name: Ejecutar flake8
          command: |
            . venv/bin/activate
            flake8 app tests

      - run:
          name: Ejecutar pylint
          command: |
            . venv/bin/activate
            pylint app/main.py

      - setup_remote_docker

      - run:
          name: Construir imagen Docker
          command: docker build -t todo-app:test ./app

      - store_artifacts:
          path: coverage.xml
          destination: coverage-report

  sonar-analysis:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

    steps:
      - checkout
      - sonarcloud/scan

  snyk-analysis:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project

    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-python-app-deps-{{ checksum "app/requirements.txt" }}
            - v1-python-app-deps-

      - run:
          name: Crear entorno virtual e instalar dependencias de la app
          command: |
            python -m venv venv
            . venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r app/requirements.txt

      - save_cache:
          key: v1-python-app-deps-{{ checksum "app/requirements.txt" }}
          paths:
            - venv

      - run:
          name: Instalar Snyk CLI
          command: |
            curl -Lo snyk https://static.snyk.io/cli/latest/snyk-linux
            chmod +x ./snyk
            sudo mv ./snyk /usr/local/bin/snyk

      - run:
          name: Autenticar Snyk
          command: snyk auth $SNYK_TOKEN

      - run:
          name: Analizar vulnerabilidades en dependencias Python
          command: |
            . venv/bin/activate
            snyk test --file=app/requirements.txt --package-manager=pip --org=cristtori > snyk-report.txt || true
            cat snyk-report.txt

      - store_artifacts:
          path: snyk-report.txt
          destination: snyk-report

workflows:
  ci_pipeline:
    jobs:
      - test-and-quality
      - sonar-analysis:
          requires:
            - test-and-quality
      - snyk-analysis:
          requires:
            - test-and-quality