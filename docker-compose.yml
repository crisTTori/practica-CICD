services:
  db-postgres:
    image: postgres:15-alpine
    container_name: todo-db-container
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - data-persistent-v2:/var/lib/postgresql/data
    networks:
      - internal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./app
    container_name: todo-api-container
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db-postgres
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASS=${POSTGRES_PASSWORD}
      - FLASK_HOST=0.0.0.0
      - FLASK_ENV=development
    depends_on:
      db-postgres:
        condition: service_healthy
    networks:
      - internal-network
    restart: unless-stopped

volumes:
  data-persistent-v2:
    driver: local

networks:
  internal-network:
    driver: bridge